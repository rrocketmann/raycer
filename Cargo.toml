[package]
name = "raycer"
version = "0.1.0"
edition = "2024"
description = "Open-source 3D racing game built as an AI gym for reinforcement learning research"
license = "CC0-1.0"

[dependencies]
bevy = "0.17"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.9"
rand_chacha = "0.9"
nalgebra = { version = "0.33", features = ["serde-serialize"] }

# Added incrementally:
# bevy_rapier3d = "0.26"
# bevy_egui = "0.34"
# pyo3 = { version = "0.24", features = ["extension-module"] }

[features]
default = []

# Speed up compilation for development
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
